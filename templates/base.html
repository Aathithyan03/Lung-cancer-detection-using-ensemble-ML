<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}LungScan{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    :root {
      --navy: #0a0e1a;
      --navy-mid: #111827;
      --navy-light: #1a2332;
      --teal: #00d4aa;
      --teal-dim: #00b894;
      --teal-glow: rgba(0, 212, 170, 0.15);
      --teal-border: rgba(0, 212, 170, 0.25);
      --red-alert: #ff4757;
      --red-glow: rgba(255, 71, 87, 0.15);
      --amber: #ffa502;
      --text-primary: #f0f4ff;
      --text-secondary: #8892a4;
      --text-muted: #4a5568;
      --card-bg: rgba(26, 35, 50, 0.85);
      --card-border: rgba(255,255,255,0.07);
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --radius: 16px;
      --radius-sm: 10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--navy);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Background grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient light blobs */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,212,170,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(10, 14, 26, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--card-border);
      padding: 0 2.5rem;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-brand-icon {
      width: 36px;
      height: 36px;
      background: var(--teal);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .nav-brand-text {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .nav-brand-text span { color: var(--teal); }

    .nav-links {
      display: flex;
      gap: 4px;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: all 0.2s;
      position: relative;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--teal);
      background: var(--teal-glow);
    }

    .nav-cta {
      background: var(--teal) !important;
      color: var(--navy) !important;
      font-weight: 700 !important;
      border-radius: 8px;
    }

    .nav-cta:hover {
      background: var(--teal-dim) !important;
      color: var(--navy) !important;
    }

    /* ── PAGE WRAPPER ── */
    .page-content {
      position: relative;
      z-index: 1;
      min-height: calc(100vh - 70px);
    }

    /* ── SHARED CARD ── */
    .glass-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
    }

    /* ── BADGE ── */
    .badge-teal {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--teal-glow);
      border: 1px solid var(--teal-border);
      color: var(--teal);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
    }

    .badge-teal::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--teal);
      border-radius: 50%;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    /* ── BUTTONS ── */
    .btn-primary-teal {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--teal);
      color: var(--navy);
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 0.95rem;
      padding: 14px 32px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s;
      letter-spacing: 0.01em;
    }

    .btn-primary-teal:hover {
      background: var(--teal-dim);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,212,170,0.35);
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-weight: 500;
      font-size: 0.9rem;
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--card-border);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn-outline:hover {
      border-color: var(--teal-border);
      color: var(--teal);
      background: var(--teal-glow);
    }

    /* ── SECTION TITLE ── */
    .section-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: var(--text-primary);
    }

    .section-title span { color: var(--teal); }

    /* ── FORM ELEMENTS ── */
    .form-label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }

    .form-control, .form-select {
      background: rgba(255,255,255,0.04) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      border-radius: var(--radius-sm) !important;
      color: var(--text-primary) !important;
      padding: 10px 14px !important;
      font-family: var(--font-body) !important;
      font-size: 0.9rem !important;
      transition: all 0.2s;
      width: 100%;
    }

    .form-control:focus, .form-select:focus {
      border-color: var(--teal-border) !important;
      box-shadow: 0 0 0 3px var(--teal-glow) !important;
      outline: none !important;
      background: rgba(0,212,170,0.05) !important;
    }

    .form-select option { background: var(--navy-mid); color: var(--text-primary); }

    /* ── FOOTER ── */
    .site-footer {
      border-top: 1px solid var(--card-border);
      padding: 24px 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 1;
    }

    .site-footer p {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .site-footer span { color: var(--teal); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--navy); }
    ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--teal); }

    /* ── UTILITIES ── */
    .text-teal { color: var(--teal); }
    .text-muted-custom { color: var(--text-secondary); }
    .divider { border: none; border-top: 1px solid var(--card-border); margin: 2rem 0; }

    /* Entrance animations */
    .fade-up {
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.6s ease forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .delay-4 { animation-delay: 0.4s; }
    .delay-5 { animation-delay: 0.5s; }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="/" class="nav-brand">
      <div class="nav-brand-icon">🫁</div>
      <span class="nav-brand-text">Lung<span>Scan</span> 
    </a>
    <ul class="nav-links">
      <li><a href="/" {% if request.path == '/' %}class="active"{% endif %}>Home</a></li>
      <li><a href="/data-info" {% if request.path == '/data-info' %}class="active"{% endif %}>Insights</a></li>
      <li><a href="/patient-form" {% if request.path == '/patient-form' %}class="active"{% endif %}>Predict</a></li>
      <li><a href="/contact" {% if request.path == '/contact' %}class="active"{% endif %}>Contact</a></li>
      <li><a href="/patient-form" class="nav-cta">Run Analysis →</a></li>
    </ul>
  </nav>

  <!-- CONTENT -->
  <div class="page-content">
    {% block content %}{% endblock %}
  </div>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p>© 2025 <span>LungScan</span>. For clinical decision support only — not a substitute for professional medical advice.</p>
    <p>Built with Flask · ML-powered · <span>v2.0</span></p>
  </footer>

</body>
</html>
